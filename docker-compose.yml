services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: kusajilisha
      POSTGRES_PASSWORD: kusajilisha
      POSTGRES_DB: kusajilisha
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kusajilisha"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgres://kusajilisha:kusajilisha@db:5432/kusajilisha
      REDIS_URL: redis://redis:6379/0
      ALLOWED_HOSTS: "*"
    volumes:
      - ./backend/media:/app/media
      - ./backend/staticfiles:/app/staticfiles
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    ports:
      - "8000:8000"
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput --clear &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2"

  nginx:
    image: nginx:alpine
    # Use 8888 on the host if 80 is taken (e.g. Docker Desktop Kubernetes ingress).
    ports:
      - "8888:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/var/www/frontend:ro
    depends_on:
      - backend

volumes:
  pgdata: {}
