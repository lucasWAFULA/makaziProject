# Production override: SSL with Let's Encrypt
# Usage:
#   1. Replace YOUR_DOMAIN in nginx-ssl.conf with your domain.
#   2. Obtain certs: certbot certonly --webroot -w ./frontend/dist -d YOUR_DOMAIN -d www.YOUR_DOMAIN ...
#   3. Run: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

version: "3.9"

services:
  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/var/www/frontend:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
